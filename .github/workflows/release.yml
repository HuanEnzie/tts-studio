name: Release

# Đẩy 1 tag dạng v* (vd: v0.1.0) -> CI build installer Windows và tạo GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        # npm install (not ci) tolerates electron-builder's optional deps that
        # the lockfile may omit depending on the resolving npm version/platform
        run: npm install --no-audit --no-fund

      - name: Unit tests
        run: npm test

      - name: Build app bundles
        run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
