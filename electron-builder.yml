appId: vn.deman.ttsstudio
productName: TTS Studio
copyright: Copyright © 2026 Deman

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

# ffmpeg is a real binary — keep it outside the asar so it can be spawned
asarUnpack:
  - "**/node_modules/ffmpeg-static/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TTS Studio
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: HuanEnzie
  repo: tts-studio
  releaseType: release
